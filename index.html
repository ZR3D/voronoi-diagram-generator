<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voronoi Diagram Generator</title>
  <style>
    *{box-sizing:border-box;}
    body { font-family: sans-serif; font-size: 13px; padding: 0; margin: 0; background-color: #435158;}
    select, input{border-radius: 4px; border:none; padding:0.33rem; background:#fff; margin-right:0.5rem; font-size: 12px;}
    input{font-size: 12px;}
    input[type=number]{width:3.3rem;}
    button {background:#356c9b; border:none; color:#fff; padding:0.39rem; cursor:pointer; font-size: 12px; border-radius: 4px;}
    button:hover{background:#57738F;}
    input[type="range"] {accent-color:#356c9b;  margin-top:5px;}
    .main{width:100%; display: flex;}
    .controls{display: flex; width: 100%;background-color: #2e3d4d;z-index: 10;color: #f1f1f1;padding: 8px 12px;align-items: center;gap: 10px;flex-wrap: wrap;}
    .hidden{display:none;}
    .color-area{color:#ffffff;}
    .color-container{}
    .color-container div{width:50px; height:50px; margin-right: 2px; display: inline-block;  font-size: 10px; padding: 5px; border-radius:4px;}
  </style>
</head>
<body>
  <div class="controls">
   <label>Site Number </label>
   <input id="siteNumberInput" type="number" value="50" min="2">
   <label>Site Size</label>
   <input id="siteSizeNumber" type="number" value="3" min="0" step="0.5" oninput="updateAppData(false)">
   <label>Show Sites </label>
   <input id="showSitesCheckbox" type="checkbox" checked="true" >
   <button onclick="relaxPoints()">Relax Sites</button>
   <label>Site Creation </label>
   <select id="siteCreationSelect" onchange="updateAppData(true)">
   <option value="random">Random</option>
   <option value="circular">Circular</option>
   <option value="spiral">Spiral</option>
   </select>
   
   
   <button onclick="renderView(true)">Generate Sites</button>
   <label>Cell Border</label>
   <input id="cellBorderNumber" type="number" value="3" min="0" step="0.5" oninput="updateAppData(false)">
   <label>Cell Rounded</label>
   <input id="cellRoundedNumber" type="number" value="4" min="0" step="0.5" oninput="updateAppData(false)">   
   <label>Cell Outline</label>
   <input id="cellOutlineCheckbox" type="checkbox" checked="true" onchange="updateAppData(false)">
   <label>Cell Colours</label>
   <select id="cellColoursSelect" onchange="updateAppData(false)">
   <option value="random">Random</option>
   <option value="random">Blues</option>
   </select>   
   <label>Background</label>
   <input id="backgroundColor" type="color" value="#222630" oninput="changeBackground(this.value)">
   <label>Width </label>
   <input id="svgWidthNumber" type="number" value="1200" min="300" step="50" onchange="updateAppData(false)">
   <label>Height</label>
   <input id="svgHeightNumber" type="number" value="600" min="300" step="50" onchange="updateAppData(false)">
   <button id="saveSvgButton">Save SVG</button>
  </div>

  <div id="main" class="main">
    <div class="svg-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" id="designSvg" width="1200" height="600" >
      <defs>
        <style id="svg-def-style" type="text/css">
          .svg-text {font-family: sans-serif; font-size: 13px;}
          .svg-circle {fill-opacity:1; stroke:none; stroke-width:0;}
          .hidden{display:none;}
        </style>
      </defs>
      <g id="backgroundLayer"><rect id="backgroundRect" width="1200" height="600" fill="#222630" /></g>
      <g id="pathLayer"></g>
      <g id="circleLayer"></g>
    </svg>
    </div>
  </div>
  
  <div class="color-area">
    <div id="colourValueText"></div>
    <div id="colours" class="color-container"></div>
    <label>Hue</label>
    <input type="range" id="hueRange" oninput="renderColorMenu()" value="208" name="points" min="0" max="360" style="width:120px">
    <label>Saturation</label>
    <input type="range" id="saturationRange" oninput="renderColorMenu()" value="40" name="points" min="0" max="100" style="width:120px">
    <label>Dark Start</label>
    <input type="range" id="lightnessMinRange" oninput="renderColorMenu()" value="40" name="points" min="0" max="50" style="width:120px">
    <label>Light End</label>
    <input type="range" id="lightnessMaxRange" oninput="renderColorMenu()" value="90" name="points" min="50" max="100" style="width:120px">
    <label>Quantity</label>
    <input type="range" id="quantityRange" oninput="renderColorMenu()" value="25" name="points" min="0" max="50" style="width:120px">
    <label>Hue Variation</label>
    <input id="hueVariationCheckbox" type="checkbox" checked="false" onchange="renderColorMenu(false)">
    <label>Randomise Opacity</label>
    <input id="fillOpacityRandomCheckbox" type="checkbox" checked="false" onchange="renderColorMenu(false)">
  </div>
  
</body>
<script>
// --- Global Declarations ---
const svgns = 'http://www.w3.org/2000/svg';
const designSvg = document.getElementById('designSvg');
const circleLayer = document.getElementById('circleLayer');
const pathLayer = document.getElementById('pathLayer');
//const fill = ['#123456','#561234','#125634','#C6832E','#3CC731', '#64748b', '#6b7280', '#71717a', '#737373', '#78716c', '#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', '#22c55e', '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6', '#6366f1', '#8b5cf6', '#a855f7', '#ef4444', '#ec4899', '#f43f5e',];
const fill = ["#f0f9ff", "#e0f2fe", "#bae6fd", "#7dd3fc", "#38bdf8" ,"#0ea5e9" ,"#0284c7" ,"#0369a1" ,"#075985" ,"#0c4a6e" ,"#082f49",];
let colorList = [];
const saveSvgButton = document.getElementById('saveSvgButton');
const showSitesCheckbox = document.getElementById('showSitesCheckbox');
const cellBorderNumber = document.getElementById('cellBorderNumber');
const cellRoundedNumber = document.getElementById('cellRoundedNumber');
const siteSizeNumber = document.getElementById('siteSizeNumber');
const siteNumberInput = document.getElementById('siteNumberInput');
const cellOutlineCheckbox = document.getElementById('cellOutlineCheckbox');
const backgroundRect = document.getElementById('backgroundRect');
const backgroundColor = document.getElementById('backgroundColor');
const svgWidthNumber = document.getElementById('svgWidthNumber'); 
const svgHeightNumber = document.getElementById('svgHeightNumber'); 
const siteCreationSelect = document.getElementById('siteCreationSelect');

const localStorageName = 'voronoiData'
let voronoiPolygons = [];
const appData = {
  siteNumber:50,
  siteSize:3,
  showSites:true,
  cellBorder:3,
  cellRounded:4,
  cellOutline: true,
  backgroundColor:'#222630',
  svgWidth: 1200,
  svgHeight: 600,
  sitePoints:[],
  siteCreation:'random',
}

// --- Event Listeners ---
showSitesCheckbox.addEventListener('change', showSitesChange);
saveSvgButton.addEventListener('click', saveSvg);
siteNumberInput.addEventListener('input', updateAppData);
svgWidthNumber.addEventListener('input', svgResize);
svgHeightNumber.addEventListener('input', svgResize);

// --- Helper Functions ---
function svgResize(){
  const height = Number(svgHeightNumber.value);
  const width = Number(svgWidthNumber.value);
  designSvg.setAttribute('height', height);
  designSvg.setAttribute('width', width);
  designSvg.setAttribute('viewBox', `0 0 ${width} ${height}` );
  backgroundRect.setAttribute('height', height);
  backgroundRect.setAttribute('width', width);
  pathLayer.setAttribute('height', height);
  pathLayer.setAttribute('width', width);
  circleLayer.setAttribute('height', height);
  circleLayer.setAttribute('width', width);  
  appData.svgWidth = width;
  appData.svgHeight = height;
  renderView(true);
}

function changeBackground(color){
  appData.backgroundColor = color;
  backgroundRect.setAttribute('fill', color);
  saveLocalStorage();
}

function updateAppData(generateSites=true){
  appData.siteNumber = Number(siteNumberInput.value);
  appData.siteSize = Number(siteSizeNumber.value);
  appData.showSites = showSitesCheckbox.checked;
  appData.cellBorder = Number(cellBorderNumber.value);
  appData.cellRounded = Number(cellRoundedNumber.value);
  appData.cellOutline = cellOutlineCheckbox.checked;
  appData.backgroundColor = backgroundColor.value;
  appData.svgWidth = Number(svgWidthNumber.value);
  appData.svgHeight = Number(svgHeightNumber.value);
  appData.siteCreation = siteCreationSelect.value;
  saveLocalStorage();
  renderView(generateSites);
}

function onLoad(){
  siteNumberInput.value = appData.siteNumber;
  siteSizeNumber.value = appData.siteSize;
  showSitesCheckbox.checked = appData.showSites;  
  cellBorderNumber.value = appData.cellBorder;
  cellRoundedNumber.value = appData.cellRounded;
  cellOutlineCheckbox.checked = appData.cellOutline;
  backgroundColor.value = appData.backgroundColor;
  svgWidthNumber.value = appData.svgWidth;
  svgHeightNumber.value = appData.svgHeight;
  showSitesChange();
  changeBackground(appData.backgroundColor);
}

function showSitesChange(){
  if(showSitesCheckbox.checked === true){
    circleLayer.classList.remove('hidden');
  }else{
    circleLayer.classList.add('hidden');
  }
  appData.showSites = showSitesCheckbox.checked; 
  saveLocalStorage();
}

function getFill(index){
  return fill[index % fill.length];
}

function generateHexString(length) {
  let result = "";
  while (result.length < length) {
    result += Math.random().toString(16).substring(2);
  }
  return result.substring(0, length);
}

// --- SVG Functions ---
function saveSvg(){
  let data = (new XMLSerializer()).serializeToString(designSvg);
  let svgBlob = new Blob([data], {type: 'image/svg+xml;charset=utf-8'});
  let url = URL.createObjectURL(svgBlob);
  const a = document.createElement('a');
  a.setAttribute('download', 'voronoi_diagram.svg');
  a.setAttribute('href', url);
  a.setAttribute('target', '_blank');
  a.click();
}

function createCircle(circleData, fill, stroke, strokeWidth=1, layer=circleLayer){
  const radius = siteSizeNumber.value;
  //const radius = (circleData.r)? circleData.r:3;
  const circle = document.createElementNS(svgns, 'circle');
  circle.setAttributeNS(null, 'cx', circleData.x);
  circle.setAttributeNS(null, 'cy', circleData.y);
  circle.setAttributeNS(null, 'r', radius);
  circle.setAttributeNS(null, 'class', 'svg-circle');
  if(fill) circle.setAttributeNS(null, 'fill', fill);
  //if(stroke) circle.setAttributeNS(null, 'stroke', stroke);
  //if(strokeWidth) circle.setAttributeNS(null, 'stroke-width', strokeWidth);  
  layer.appendChild(circle);
}

function createPath(pathInfo, fill, fillOpacity, stroke, strokeWidth, id, layer, closePath){
  let d;
  if(typeof pathInfo === "string"){
      d = pathInfo; //is a string
  }else{
      if(pathInfo.length!=0){
        d = createPathString(pathInfo, closePath); //is a point array
      }else{
        return false;
      }
  }
  let path = document.createElementNS(svgns, 'path');
  path.setAttributeNS(null, 'id', id);
  path.setAttributeNS(null, 'd', d);
  path.setAttributeNS(null, 'class', 'poly');
  if(fill) path.setAttributeNS(null, 'fill', fill);
  if(fillOpacity) path.setAttributeNS(null, 'fill-opacity', fillOpacity);
  if(cellOutlineCheckbox.checked){
    if(stroke) path.setAttributeNS(null, 'stroke', stroke);
    if(strokeWidth) path.setAttributeNS(null, 'stroke-width', strokeWidth);
  }
  layer.appendChild(path);
}

function createPathString(posList, closePath){
  let d = "M" + + posList[0].x + " " + posList[0].y;
  for(let i=1; i<posList.length; i++) {
      d += " L" + posList[i].x + " " + posList[i].y;
  }
  if(closePath) d += " z";
  return d;
}

function getPolygonCentroid(ptsOriginal) {
    pts = Object.create(ptsOriginal);
    let first = pts[0]
    let last = pts[pts.length-1];
    if (first.x != last.x || first.y != last.y) pts.push(first);
    let twicearea=0,
    x=0, y=0,
    nPts = pts.length,
    p1, p2, f;
    for(let i=0, j=nPts-1; i<nPts; j=i++){
        p1 = pts[i]; p2 = pts[j];
        f = p1.x*p2.y - p2.x*p1.y;
        twicearea += f;
        x += ( p1.x + p2.x ) * f;
        y += ( p1.y + p2.y ) * f;
    }
    f = twicearea * 3;
    return { x:x/f, y:y/f };
}

function curvePolygon(points, lengthToCurve = 6){
 
  let threshold = lengthToCurve * 2;
  if(threshold === 0) threshold = 2;
  if(threshold > 10) threshold = 10;
  
  let svgString = '';
  const pointsNew = [];

  // Remove by distance (doubles)
  for(let j=0; j<points.length; j++){
    let distance = 100;
    for(let i=0; i<pointsNew.length; i++){
      const testDifference = calculateDistance(pointsNew[i],points[j],true)
      if(testDifference<distance) distance = testDifference;
    }
    if(distance>threshold){
      pointsNew.push(points[j])
    }
  }

  for(let i=0; i<pointsNew.length; i++){
    const iNext = (i+1) % pointsNew.length;
    const iNextNext = (i+2) % pointsNew.length;
    // Line and curve
    const corner = pointsNew[iNext];
    const lineStart = findPointOnLineByDistance(pointsNew[i], corner, lengthToCurve, false)
    const lineEnd = findPointOnLineByDistance(pointsNew[i], corner, lengthToCurve, true)
    const curveEnd = findPointOnLineByDistance(corner, pointsNew[iNextNext], lengthToCurve, false)
    const letter = (i===0)? 'M':'L'
    if(i===0) svgString += `M${lineStart.x} ${lineStart.y}`;
    svgString += ` L${lineEnd.x} ${lineEnd.y} Q${corner.x} ${corner.y} ${curveEnd.x} ${curveEnd.y}` 
  }
  return svgString;
}

function rotatePoint(centerOfRotation, pointToRotate, degrees){
  let length = calculateDistance(centerOfRotation, pointToRotate, true) + 300; //find line distance
  let angle = lineAngle(centerOfRotation, pointToRotate, true); //find current angle
  let xRot = centerOfRotation.x + (Math.cos(Math.PI/180 * (degrees+angle))*length);
  let yRot = centerOfRotation.y + (Math.sin(Math.PI/180 * (degrees+angle))*length);
  return {x:niceNum(xRot),y:niceNum(yRot)};
}

function rotateAroundPoint(centerOfRotation, degrees, length){
    let xRot = centerOfRotation.x + (Math.cos(Math.PI/180 * degrees)*length);
    let yRot = centerOfRotation.y + (Math.sin(Math.PI/180 * degrees)*length);
    return {x:xRot,y:yRot};
}

function findPointOnLineByDistance(pos1, pos2, distance, inverse = false){
  const lineLength = calculateDistance(pos1, pos2, true);
  let percent = distance/lineLength;
  if(inverse) percent = 1 - percent;
  return findPointOnLine(pos1, pos2, percent);
}

function findPointOnLine(pos1,pos2,percent){
  let xPos = pos1.x+((pos2.x-pos1.x)*percent);
  let yPos = pos1.y-((pos1.y-pos2.y)*percent);
  return {x:xPos,y:yPos};
}

function niceNum(num, decimalPlaces=5){
  num = (Number.isInteger(num))? Number(num):Number(num.toFixed(decimalPlaces));
  return parseFloat(num); //removes trailing zeros
}

function calculateDistance(pos1,pos2,positiveOnly){
  let a = Number(pos1.x) - Number(pos2.x);
  let b = Number(pos1.y) - Number(pos2.y);
  let ans = Math.sqrt(a*a + b*b)
  if(positiveOnly){ans = Math.abs(ans)}
  if(isNaN(ans)){ans=10000;}
  return ans;
}

function inside(point, vs) {
  const x = point.x;
  const y = point.y;
  let isInside = false;

  // Loop through each edge of the polygon
  // i is the current vertex, j is the previous vertex
  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
    const xi = vs[i].x, yi = vs[i].y;
    const xj = vs[j].x, yj = vs[j].y;
    
    // Check if the ray from the point intersects the edge between i and j
    const intersect = ((yi > y) !== (yj > y))
      && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        
    if (intersect) {
      isInside = !isInside;
    }
  }    
  return isInside;
}

function lineAngle(pos1, pos2, positiveOnly){
  const deltaX = pos2.x - pos1.x ;
  const deltaY = pos2.y - pos1.y;
  const rad = Math.atan2(deltaY, deltaX); // In radians
  let deg = rad * (180 / Math.PI); // In degrees
  if(positiveOnly && deg<0) deg += 360;
  return Number(deg.toFixed(5));
}

// Improved line intersect - includes is the intersection along the segments
function lineIntersect(pos1, pos2, pos3, pos4, alongSegment){
  // Check if none of the lines are of length 0
  if ((pos1.x === pos2.x && pos1.y === pos2.y) || (pos3.x === pos4.x && pos3.y === pos4.y)) {
    return false;
  }
  let denominator = ((pos4.y - pos3.y) * (pos2.x - pos1.x) - (pos4.x - pos3.x) * (pos2.y - pos1.y));
  // Lines are parallel
  if (denominator === 0) {
    return false;
  }
  let ua = ((pos4.x - pos3.x) * (pos1.y - pos3.y) - (pos4.y - pos3.y) * (pos1.x - pos3.x)) / denominator;
  let ub = ((pos2.x - pos1.x) * (pos1.y - pos3.y) - (pos2.y - pos1.y) * (pos1.x - pos3.x)) / denominator;

  // Is the intersection along the segments
  if(alongSegment==true){
    if (ua < 0 || ua > 1 || ub < 0 || ub > 1) {
      return false;
    }
  }
  // Return a object with the x and y coordinates of the intersection
  let x = pos1.x + ua * (pos2.x - pos1.x);
  let y = pos1.y + ua * (pos2.y - pos1.y);
  return {x, y};
}

function createBisectorLine(p1, p2, index, corners, width, height, border = 0, drawLine = false){
  //Find midpoints
  let midpoint = findPointOnLine(p1, p2, 0.5);
  if(border !== 0){
    midpoint = findPointOnLineByDistance(midpoint, p1, border)
  }
  
  const a = rotatePoint(midpoint, p1, 90);
  const b = rotatePoint(midpoint, p2, 90);
  const extended = [];
  
  // Extend to edge of rectangle;
  for(let i=0; i<corners.length; i++){
    const iNext = (i+1) % corners.length;
    const intersectPoint = lineIntersect(corners[i], corners[iNext], a, b, false);
    if((intersectPoint.x >= 0 && intersectPoint.x <= width )&& (intersectPoint.y >= 0 && intersectPoint.y <= height)){
      extended.push(intersectPoint);
    }
  }

  if(drawLine){
    createCircle(midpoint, null, null, null, circleLayer);
    createPath(extended, null, null, getFill(index), 1, 'x', pathLayer, false);
  }
  
  return {a:extended[0], b:extended[1]}
}

function randomIntFromInterval(min, max) { // min and max included 
  return Math.floor(Math.random() * (max - min + 1) + min)
}

function randomPoint(width, height){
  return { 
    x:randomIntFromInterval(5, width-5),
    y:randomIntFromInterval(5, height-5),
    r:5,
  }
}

function relaxPoints(){
  const sitePointsNew = [];
  
  voronoiPolygons.forEach((polygon,index) => {
    const centroid = getPolygonCentroid(polygon);
    centroid.opacity = appData.sitePoints[index].opacity;
    sitePointsNew.push(centroid);
  });
  
  appData.sitePoints = sitePointsNew;
  renderView(false)
}

function saveLocalStorage(){
  const json = JSON.stringify(appData);
  localStorage.setItem(localStorageName, json);  
}

function loadLocalStorage(){
  const local = localStorage.getItem(localStorageName);
  if (local) {
    try {
      const data = JSON.parse(local);
      Object.assign(appData, data); // merge without losing reference
      onLoad();
      renderView(true);
      svgResize();
      console.log('Loading local data', appData);
    } catch (e) {
      saveLocalStorage();
      renderView(true);
      console.log('LocalStorage data unavailable');
    }
  }else{
    saveLocalStorage();
    renderView(true);
  }
}

function isEven(n) {
   return n % 2 == 0;
}

function renderView(recalculatePoints){
  circleLayer.innerHTML = '';
  pathLayer.innerHTML = '';
  voronoiPolygons = [];
  const width = appData.svgWidth;
  const height = appData.svgHeight;
  const siteNumber = Number(siteNumberInput.value);
  const cellBorder = Number(cellBorderNumber.value);
  const cellRounded = Number(cellRoundedNumber.value);

  //Start with our rectangle boundry corners
  const corners = [
    {x:0, y:0, type:'corner'}, // tl
    {x:width, y:0, type:'corner'}, // tr
    {x:width, y:height, type:'corner'}, // br
    {x:0, y:height, type:'corner'}, // bl
  ];

  if(recalculatePoints){
  appData.sitePoints = [];  
  
  const centerPoint = {x:width/2, y:height/2};
  appData.sitePoints.push(centerPoint);
  let degrees = 0;
  let distanceIncriment = 80;
  let distanceFromCenter = distanceIncriment;
  let fanCount = 10;
  let degreeIncriment = 360/fanCount;
 
  if(appData.siteCreation==='random'){
    // Add Random if at least 10 units apart
    for(let i=0; i<siteNumber; i++){
      let distance = width;
      const randPoint = randomPoint(width, height);
      // Check if the distance from all points is enough;
      appData.sitePoints.forEach(site =>{
        const distanceCheck = calculateDistance(site,randPoint,true)
        if(distance>distanceCheck) distance = distanceCheck;
      });
      if(distance>10){
        randPoint.opacity = randomIntFromInterval(30, 90)/100;
        appData.sitePoints.push(randPoint);
      }    
    }    
  }else if(appData.siteCreation==='circular'){
    
    for(let i=0; i<fanCount; i++){
      for(let j=1; j<10; j++){
        let additionalDegree = (isEven(j))? 0:degreeIncriment/2;
        const point = rotateAroundPoint(centerPoint, degrees + additionalDegree, distanceFromCenter+(j*distanceIncriment));
        
        if((point.x >= 0 && point.x <= width )&& (point.y >= 0 && point.y <= height)){
          appData.sitePoints.push(point);
        }
    }
    degrees += degreeIncriment;
  }  
  }else if(appData.siteCreation==='spiral'){
      for(let j=0; j<3; j++){
    for(let i=1; i<50; i++){
      distanceFromCenter = (10 * i) + (50*j);
      const point = rotateAroundPoint(centerPoint, degrees, distanceFromCenter);
      if((point.x >= 0 && point.x <= width )&& (point.y >= 0 && point.y <= height)){
        appData.sitePoints.push(point);
      }      
      degrees = (degrees+20) % 360;
      console.log(distanceFromCenter, degrees)
    }
  }    
  }
  }
   
  // Make circles
  appData.sitePoints.forEach((site, index) =>{
    createCircle(site, getFill(index+1), null, null, circleLayer);
  });
   
  const sitePointsLen = appData.sitePoints.length;

  for (let x=0; x<sitePointsLen; x++){ 
    const siteIndex =  x ;
    const currentSite = appData.sitePoints[siteIndex];

    // Assign angle and distance from selected site (id);
    appData.sitePoints.forEach((site, index) =>{
      site.distance = calculateDistance(currentSite, site, true);
    });

    // Clone and remove the current site at site index
    const sitePointsClone =  [...appData.sitePoints];
    sitePointsClone.splice(siteIndex, 1)
    sitePointsClone.sort((a, b) => {
      return parseFloat(a.distance) - parseFloat(b.distance); //by number
    });

    // Reduce the poly!
    let reducedPoly1 = corners;
    for(let i=0; i<sitePointsClone.length; i++){
      bisectorLine = createBisectorLine(currentSite, sitePointsClone[i], i, corners, width, height, cellBorder, false);
      reducedPoly1 = reducePolygon(reducedPoly1, bisectorLine, currentSite, width, height, true);
    }
    // Add to polygon list
    voronoiPolygons.push(reducedPoly1);
    const curvedPolygon = curvePolygon(reducedPoly1, cellRounded);
    createPath(curvedPolygon, getFill(x), currentSite.opacity, '#123456', 1, 'x-' + x, pathLayer, true);
    //createPath(reducedPoly1, getFill(x), currentSite.opacity, '#123456', 1, 'x', pathLayer, true);
  } 
}

function reducePolygon(polygon, bisectorLine, currentSite, width, height, segmentOnly = true){
  const newPolygon = [];
  intersectCount = 0;
  
  for(let i=0; i<polygon.length; i++){
    intersectCount = 0;
    polygon[i].type = 'corner'; // Reset type to corner
    newPolygon.push(polygon[i]); 
    const iNext = (i+1) % polygon.length;
    // Check if the bisector line intersects a polygon edge
    const intersectPoint = lineIntersect(polygon[i], polygon[iNext], bisectorLine.a, bisectorLine.b, segmentOnly);
    if(intersectPoint){
    //if((intersectPoint.x >= 0 && intersectPoint.x <= width )&& (intersectPoint.y >= 0 && intersectPoint.y <= height)){
      intersectPoint.type = 'intersect';
      newPolygon.push(intersectPoint);
    }
  }

  const polyTest1 = [];
  const polyTest2 = [];  
  
  for(let i=0; i<newPolygon.length; i++){
    const point = newPolygon[i];
    if(point.type === 'intersect') intersectCount++;    
    // cnr -> int -> int -> cnr
    if(point.type === 'intersect' || intersectCount!==1){
      polyTest1.push(point);
    }
    // int -> cnr-> cnr-> int 
    if(point.type === 'intersect' || intersectCount===1){
      polyTest2.push(point);
    }
  }  

  if(inside(currentSite, polyTest1)){    
    return polyTest1;
  } else if(inside(currentSite, polyTest2)){
    return polyTest2;
  }else{
    return polygon; //return original
  }
}

function init(){
  loadLocalStorage();
}

init();

</script>
<script>
// Color scale
// --- Global Declarations ---
const colours = document.getElementById('colours');
const hueRange = document.getElementById('hueRange');
const saturationRange = document.getElementById('saturationRange');
const colourValueText = document.getElementById('colourValueText');
const lightnessMinRange = document.getElementById('lightnessMinRange');
const lightnessMaxRange = document.getElementById('lightnessMaxRange');
const quantityRange = document.getElementById('quantityRange');
const hueVariationCheckbox = document.getElementById('hueVariationCheckbox');
const fillOpacityRandomCheckbox = document.getElementById('fillOpacityRandomCheckbox');
const randomOpacityList = [];

function hslToHex(h, s, l) {
  s /= 100;
  l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const color = l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`;
}

function colorise(){
  const colorListLen = colorList.length;
  document.querySelectorAll('.poly').forEach((poly,index) => {
    const color = colorList[index % colorListLen];
    const opacity = (fillOpacityRandomCheckbox.checked)? randomOpacityList[index % randomOpacityList.length]:1;
    poly.setAttribute('fill-opacity', opacity);
    poly.setAttribute('fill', color);
    if(cellOutlineCheckbox.checked){
      poly.setAttribute('stroke', color);
      poly.setAttribute('stroke-opacity', opacity);
    }else{
      poly.setAttribute('stroke', 'none');
      poly.setAttribute('stroke-opacity', 0);
    }

  });  
}

function renderColorMenu(){
  colorList = [];
  colours.innerHTML = '';
  let hue = hueRange.value;
  const saturation = saturationRange.value;
  let lightness = 50;
  const colorCount = Number(quantityRange.value);
  const minLightness = 50-Number(lightnessMinRange.value);
  const maxLightness = Number(lightnessMaxRange.value);
  const colorDistance = (maxLightness-minLightness)/colorCount;
  
  const hueDistance =360/colorCount;
  
  for(let i=0; i<colorCount; i++){    
    if(hueVariationCheckbox.checked){
      hue = (hueDistance*i);
    }else{
      lightness = minLightness + (colorDistance*i);
    }    
    const hsl = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
    const hex = hslToHex(hue, saturation, lightness);
    const divCol = document.createElement('div');
    divCol.id = 'color_' + i;
    divCol.textContent = hex;
    divCol.style.background = hex;
    colours.appendChild(divCol);
    colorList.push(hex);
  }
  colourValueText.textContent = `Hue:${hue} Saturation:${saturation}`;
  colorise();
}

function createRandomOpacities(){
  for(let i = 0; i<100; i++){
    randomOpacityList.push(Math.random());
  } 
}
createRandomOpacities();
renderColorMenu();
</script>
